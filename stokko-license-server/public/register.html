<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - License Server</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="centered-layout">
        <div class="card auth-card">
            <div class="text-center" style="text-align: center;">
                <h1 class="logo">BodegApp Licencias</h1>
                <h2 style="margin-bottom: 1.5rem;">Registro de Usuario</h2>
            </div>

            <form id="registerForm">
                <input type="hidden" id="token">
                <div class="form-group">
                    <label class="form-label">Usuario</label>
                    <input type="text" id="username" class="form-control" required placeholder="Elige tu usuario">
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" required placeholder="********">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" class="form-control" required placeholder="********">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Registrarse</button>
            </form>
            <div id="message" class="mt-4" style="text-align: center; color: var(--text-secondary);"></div>
        </div>
    </div>

    <script>
        // Use consistent API base path
        const API_BASE = '/admin-licencias/api';

        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.body.innerHTML = '<div class="centered-layout"><h1 style="color:white; text-align:center">Token inválido o faltante</h1></div>';
        } else {
            document.getElementById('token').value = token;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showMessage('Las contraseñas no coinciden', 'error');
                return;
            }

            try {
                // FIXED: API Path
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, token })
                });
                const data = await res.json();

                if (data.success) {
                    showMessage('Usuario creado exitosamente. Redirigiendo...', 'success');
                    setTimeout(() => window.location.href = 'admin.html', 2000); // Redirect to admin.html explicitly
                } else {
                    showMessage(data.error || 'Error al registrar', 'error');
                }
            } catch (err) {
                console.error(err);
                showMessage('Error de conexión: ' + err.message, 'error');
            }
        });

        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.style.color = type === 'error' ? 'var(--danger-color)' : 'var(--success-color)';
        }
    </script>
</body>

</html>
