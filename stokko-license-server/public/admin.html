<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Licencias - Stokko</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
        .hidden { display: none !important; }
        .center { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 1.75rem; box-shadow: 0 10px 40px rgba(0,0,0,.4); }
        .auth-card { width: 100%; max-width: 380px; }
        h1, h2, h3 { color: #f8fafc; }
        label { display: block; font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; margin: .6rem 0 .25rem; }
        input, select { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: .6rem .7rem; border-radius: 8px; font-size: .9rem; }
        input:focus, select:focus { outline: none; border-color: #3b82f6; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: 600; padding: .6rem 1rem; font-size: .88rem; transition: .15s; }
        .btn-primary { background: #2563eb; color: #fff; width: 100%; margin-top: 1rem; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-sm { padding: .35rem .6rem; font-size: .75rem; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-warn { background: #d97706; color: #fff; }
        .btn-ok { background: #059669; color: #fff; }
        .btn-ghost { background: #334155; color: #e2e8f0; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: #1e293b; border-bottom: 1px solid #334155; }
        .wrap { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }
        .grid { display: grid; gap: 1rem; }
        @media (min-width: 800px) { .grid-2 { grid-template-columns: 1fr 2fr; } }
        table { width: 100%; border-collapse: collapse; font-size: .82rem; }
        th, td { text-align: left; padding: .55rem .5rem; border-bottom: 1px solid #334155; vertical-align: top; }
        th { color: #94a3b8; font-size: .7rem; text-transform: uppercase; }
        .pill { display: inline-block; padding: .12rem .5rem; border-radius: 999px; font-size: .68rem; font-weight: 700; }
        .pill.activa { background: #064e3b; color: #6ee7b7; }
        .pill.pendiente { background: #78350f; color: #fcd34d; }
        .pill.revocada { background: #7f1d1d; color: #fca5a5; }
        .key { font-family: ui-monospace, monospace; letter-spacing: .04em; }
        .toolbar { display: flex; gap: .5rem; flex-wrap: wrap; align-items: end; margin-bottom: 1rem; }
        .toolbar > div { flex: 1; min-width: 140px; }
        .msg { margin-top: .75rem; font-size: .85rem; text-align: center; min-height: 1.2rem; }
        .msg.error { color: #fca5a5; } .msg.ok { color: #6ee7b7; }
        .created-list { background: #0f172a; border: 1px dashed #475569; border-radius: 8px; padding: .75rem; margin-top: .75rem; max-height: 180px; overflow: auto; }
        .actions { display: flex; gap: .3rem; flex-wrap: wrap; }
        .muted { color: #94a3b8; font-size: .78rem; }
    </style>
</head>

<body>
    <!-- LOGIN -->
    <div id="loginScreen" class="center">
        <div class="card auth-card">
            <div style="text-align:center; margin-bottom:1rem;">
                <h2>Stokko Admin</h2>
                <p class="muted">Panel de licencias</p>
            </div>
            <form id="loginForm">
                <label for="username">Usuario</label>
                <input id="username" type="text" autocomplete="username" required>
                <label for="password">Contraseña</label>
                <input id="password" type="password" autocomplete="current-password" required>
                <button class="btn-primary" type="submit">Ingresar</button>
                <p id="loginMsg" class="msg error"></p>
            </form>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">
        <div class="topbar">
            <h2>Licencias</h2>
            <div style="display:flex; gap:.5rem; align-items:center;">
                <span id="whoami" class="muted"></span>
                <button class="btn-ghost btn-sm" id="btnChangePass">Cambiar clave</button>
                <button class="btn-ghost btn-sm" id="btnLogout">Salir</button>
            </div>
        </div>

        <div class="wrap grid grid-2">
            <!-- Crear licencia -->
            <div class="card" style="align-self:start;">
                <h3>Generar licencia</h3>
                <form id="createForm">
                    <label for="plan">Plan</label>
                    <select id="plan">
                        <option value="PRO">PRO</option>
                        <option value="BASICO">BÁSICO</option>
                        <option value="LIFETIME">DE POR VIDA</option>
                    </select>
                    <label for="dias">Días de validez (vacío = sin expiración)</label>
                    <input id="dias" type="number" min="1" placeholder="Ej: 365">
                    <label for="cantidad">Cantidad</label>
                    <input id="cantidad" type="number" min="1" max="100" value="1">
                    <label for="notas">Notas (cliente)</label>
                    <input id="notas" type="text" placeholder="Bodega La Esquina">
                    <button class="btn-primary" type="submit">Generar</button>
                    <p id="createMsg" class="msg"></p>
                    <div id="createdList" class="created-list hidden"></div>
                </form>
            </div>

            <!-- Listado -->
            <div class="card">
                <div class="toolbar">
                    <div>
                        <label>Buscar</label>
                        <input id="search" type="text" placeholder="clave, equipo, HWID, notas">
                    </div>
                    <div style="max-width:180px;">
                        <label>Estado</label>
                        <select id="estadoFilter">
                            <option value="all">Todas</option>
                            <option value="pendiente">Pendientes</option>
                            <option value="activa">Activas</option>
                            <option value="revocada">Revocadas</option>
                        </select>
                    </div>
                    <button class="btn-ghost btn-sm" id="btnRefresh">Refrescar</button>
                </div>

                <table>
                    <thead>
                        <tr><th>Clave</th><th>Estado</th><th>Plan</th><th>Equipo / HWID</th><th>Expira</th><th>Acciones</th></tr>
                    </thead>
                    <tbody id="licenseRows"><tr><td colspan="6" class="muted">Cargando...</td></tr></tbody>
                </table>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1rem;">
                    <span id="pageInfo" class="muted"></span>
                    <div>
                        <button class="btn-ghost btn-sm" id="prevPage">Anterior</button>
                        <button class="btn-ghost btn-sm" id="nextPage">Siguiente</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        let TOKEN = localStorage.getItem('admin_token') || '';
        let state = { page: 1, pages: 1, search: '', estado: 'all' };

        const $ = (id) => document.getElementById(id);

        async function api(pathname, options = {}) {
            const res = await fetch(`${API}${pathname}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(TOKEN ? { 'Authorization': `Bearer ${TOKEN}` } : {}),
                    ...(options.headers || {})
                }
            });
            if (res.status === 401 || res.status === 403) {
                if (pathname.startsWith('/admin')) { logout(); throw new Error('Sesión expirada'); }
            }
            const text = await res.text();
            let data = {};
            try { data = text ? JSON.parse(text) : {}; } catch (_) { data = { error: 'Respuesta inválida' }; }
            return { ok: res.ok, status: res.status, data };
        }

        function showDashboard() {
            $('loginScreen').classList.add('hidden');
            $('dashboard').classList.remove('hidden');
            loadLicenses();
        }
        function showLogin() {
            $('dashboard').classList.add('hidden');
            $('loginScreen').classList.remove('hidden');
        }
        function logout() {
            TOKEN = '';
            localStorage.removeItem('admin_token');
            showLogin();
        }

        $('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            $('loginMsg').textContent = '';
            const { ok, data } = await api('/login', {
                method: 'POST',
                body: JSON.stringify({ username: $('username').value, password: $('password').value })
            });
            if (ok && data.token) {
                TOKEN = data.token;
                localStorage.setItem('admin_token', TOKEN);
                $('whoami').textContent = data.username;
                showDashboard();
            } else {
                $('loginMsg').textContent = data.error || 'No se pudo iniciar sesión';
            }
        });

        $('btnLogout').addEventListener('click', logout);

        $('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            $('createMsg').textContent = '';
            $('createMsg').className = 'msg';
            const body = {
                plan: $('plan').value,
                dias: $('dias').value || null,
                cantidad: parseInt($('cantidad').value || '1', 10),
                notas: $('notas').value
            };
            const { ok, data } = await api('/admin/licenses', { method: 'POST', body: JSON.stringify(body) });
            if (ok && data.licenses) {
                $('createMsg').textContent = `${data.licenses.length} licencia(s) generada(s).`;
                $('createMsg').classList.add('ok');
                const list = $('createdList');
                list.classList.remove('hidden');
                list.innerHTML = data.licenses.map(l => `<div class="key">${esc(l.key)}</div>`).join('');
                loadLicenses();
            } else {
                $('createMsg').textContent = data.error || 'Error al generar';
                $('createMsg').classList.add('error');
            }
        });

        // A.2: escape anti-XSS. `equipo`/`notas`/`hwid` provienen (parcialmente) del cliente no
        // autenticado (systemName de /activate); sin escapar serían XSS almacenado en el panel.
        function esc(v) {
            if (v === null || v === undefined) return '';
            return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function estadoPill(estado) {
            const cls = estado === 'activa' ? 'activa' : estado === 'revocada' ? 'revocada' : 'pendiente';
            return `<span class="pill ${cls}">${esc(estado)}</span>`;
        }

        function rowActions(l) {
            const btns = [];
            if (l.estado !== 'revocada') btns.push(`<button class="btn-danger btn-sm" data-act="revoke" data-key="${l.key}">Revocar</button>`);
            else btns.push(`<button class="btn-ok btn-sm" data-act="reactivate" data-key="${l.key}">Reactivar</button>`);
            if (l.hwid) btns.push(`<button class="btn-warn btn-sm" data-act="unbind" data-key="${l.key}">Desvincular</button>`);
            btns.push(`<button class="btn-ghost btn-sm" data-act="delete" data-key="${l.key}">Eliminar</button>`);
            return `<div class="actions">${btns.join('')}</div>`;
        }

        async function loadLicenses() {
            const params = new URLSearchParams({ page: state.page, limit: 20, search: state.search, estado: state.estado });
            const { ok, data } = await api(`/admin/licenses?${params.toString()}`);
            const tbody = $('licenseRows');
            if (!ok) { tbody.innerHTML = `<tr><td colspan="6" class="muted">${data.error || 'Error'}</td></tr>`; return; }
            state.pages = data.pages || 1;
            $('pageInfo').textContent = `Página ${data.page} de ${data.pages} — ${data.total} licencia(s)`;
            if (!data.licenses.length) { tbody.innerHTML = `<tr><td colspan="6" class="muted">Sin resultados</td></tr>`; return; }
            tbody.innerHTML = data.licenses.map(l => `
                <tr>
                    <td class="key">${esc(l.key)}<div class="muted">${esc(l.notas || '')}</div></td>
                    <td>${estadoPill(l.estado)}</td>
                    <td>${esc(l.plan || '')}</td>
                    <td>${l.equipo ? esc(l.equipo) : '<span class="muted">—</span>'}<div class="muted key" style="font-size:.65rem;">${l.hwid ? esc(l.hwid.substring(0, 24)) + '…' : ''}</div></td>
                    <td>${l.fechaExpiracion ? new Date(l.fechaExpiracion).toLocaleDateString() : '<span class="muted">nunca</span>'}</td>
                    <td>${rowActions(l)}</td>
                </tr>`).join('');
        }

        $('licenseRows').addEventListener('click', async (e) => {
            const btn = e.target.closest('button[data-act]');
            if (!btn) return;
            const key = btn.dataset.key;
            const act = btn.dataset.act;
            const labels = { revoke: 'revocar', reactivate: 'reactivar', unbind: 'desvincular el equipo de', delete: 'ELIMINAR' };
            if (!confirm(`¿Seguro que deseas ${labels[act]} la licencia ${key}?`)) return;

            let pathname = '/admin/licenses/revoke', method = 'POST';
            if (act === 'reactivate') pathname = '/admin/licenses/reactivate';
            else if (act === 'unbind') pathname = '/admin/licenses/unbind';
            else if (act === 'delete') { pathname = '/admin/licenses'; method = 'DELETE'; }

            const { ok, data } = await api(pathname, { method, body: JSON.stringify({ key }) });
            if (ok) loadLicenses(); else alert(data.error || 'Error');
        });

        $('search').addEventListener('input', (e) => { state.search = e.target.value; state.page = 1; loadLicenses(); });
        $('estadoFilter').addEventListener('change', (e) => { state.estado = e.target.value; state.page = 1; loadLicenses(); });
        $('btnRefresh').addEventListener('click', loadLicenses);
        $('prevPage').addEventListener('click', () => { if (state.page > 1) { state.page--; loadLicenses(); } });
        $('nextPage').addEventListener('click', () => { if (state.page < state.pages) { state.page++; loadLicenses(); } });

        $('btnChangePass').addEventListener('click', async () => {
            const currentPassword = prompt('Contraseña actual:');
            if (!currentPassword) return;
            const newPassword = prompt('Nueva contraseña (mínimo 10 caracteres):');
            if (!newPassword) return;
            const { ok, data } = await api('/admin/change-password', {
                method: 'POST', body: JSON.stringify({ currentPassword, newPassword })
            });
            alert(ok ? 'Contraseña actualizada' : (data.error || 'Error'));
        });

        // Init
        if (TOKEN) showDashboard(); else showLogin();
    </script>
</body>

</html>
