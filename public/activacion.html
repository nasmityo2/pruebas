<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BodegApp | Activación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="/css/output.css" rel="stylesheet">
<link href="/css/theme.css" rel="stylesheet">
<link href="/css/toast.css" rel="stylesheet">
<script src="/js/toast.js" defer></script>
<style>
.code-box { letter-spacing: .12em; }
</style>
</head>
<body class="bg-app">
<script>
if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
document.body.classList.add('dark-mode');
}
</script>
<div class="flex flex-col h-screen overflow-hidden">
<!-- BARRA DE TITULO PERSONALIZADA (idéntica a index.html) -->
<div id="custom-titlebar" class="custom-titlebar flex justify-between items-center px-4 select-none" style="-webkit-app-region: drag; height: 38px; min-height: 38px; box-sizing: border-box;">
<div class="flex items-center gap-2" style="-webkit-app-region: no-drag;">
<img src="/images/favicon.ico" alt="Logo" class="brand-logo" style="height:18px;width:auto;border-radius:4px;" onerror="this.style.display='none'">
<span class="brand-name" style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;">BodegApp</span>
</div>
<div class="flex-1 h-full"></div>
<div class="flex items-center gap-0.5" style="-webkit-app-region: no-drag;">
<button id="win-btn-minimize" class="win-btn" style="width:32px;height:28px;background:transparent;border:none;cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;" title="Minimizar">
<svg style="width:12px;height:12px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" /></svg>
</button>
<button id="win-btn-maximize" class="win-btn" style="width:32px;height:28px;background:transparent;border:none;cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;" title="Maximizar">
<svg style="width:11px;height:11px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" /></svg>
</button>
<button id="win-btn-close" class="win-btn" style="width:32px;height:28px;background:transparent;border:none;cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;" title="Cerrar">
<svg style="width:12px;height:12px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
</button>
</div>
</div>
<!-- CONTENIDO CENTRADO SOBRE EL FONDO REAL DE LA APP -->
<div class="flex-1 flex items-center justify-center p-4 overflow-auto">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
<div class="bg-gradient-to-r from-blue-600 to-indigo-700 px-6 py-5 text-white text-center">
<h1 class="text-2xl font-extrabold tracking-tight">BodegApp</h1>
<p class="text-sm opacity-90 mt-1">Activación requerida</p>
</div>
<div class="p-6 space-y-5">
<div id="status-banner" class="text-sm text-center text-gray-600 bg-gray-100 rounded-lg py-2 px-3">
Verificando estado de la licencia...
</div>
<div>
<label class="block text-xs font-semibold text-gray-500 uppercase mb-1">ID de este equipo (HWID)</label>
<div class="flex items-center gap-2">
<input id="hwid" type="text" readonly class="code-box w-full bg-gray-50 border border-gray-300 rounded-md p-2 text-xs text-gray-700 truncate">
<button id="btn-copy-hwid" type="button" class="shrink-0 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-semibold px-3 py-2 rounded-md">Copiar</button>
</div>
<p class="text-[11px] text-gray-400 mt-1">Envía este ID al proveedor para vincular tu licencia.</p>
</div>
<form id="activate-form" class="space-y-3">
<div>
<label for="license-key" class="block text-xs font-semibold text-gray-500 uppercase mb-1">Clave de licencia</label>
<input id="license-key" type="text" autocomplete="off" placeholder="BGA-XXXXX-XXXXX-XXXXX-XXXXX" class="code-box w-full border border-gray-300 rounded-md p-3 text-sm uppercase focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
</div>
<button type="submit" id="btn-activate" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition">
Activar
</button>
</form>
<div class="relative">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
<div class="relative flex justify-center"><span class="bg-white px-2 text-xs text-gray-400">o</span></div>
</div>
<button id="btn-trial" type="button" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-xl transition">
Iniciar prueba de 72 horas
</button>
<p id="gate-message" class="text-sm text-center hidden"></p>
</div>
</div>
</div>
</div>
<script src="/js/activacion.js"></script>
<script>
// Controles de ventana (idéntico a index.html)
if (window.electronWindow) {
document.getElementById('win-btn-minimize').addEventListener('click', () => window.electronWindow.minimize());
document.getElementById('win-btn-maximize').addEventListener('click', () => window.electronWindow.maximize());
document.getElementById('win-btn-close').addEventListener('click', () => window.electronWindow.close());
} else {
const titlebar = document.getElementById('custom-titlebar');
if (titlebar) titlebar.style.display = 'none';
}
</script>
</body>
</html>
